stages:
  - test
  - build
  - release

variables:
  NODE_VERSION: "22"
  IMAGE_NAME: $CI_REGISTRY_IMAGE

test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - bash run-tests.sh
  artifacts:
    when: always
    reports:
      junit: test-results/junit.xml
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker build -t $IMAGE_NAME:$CI_COMMIT_TAG -t $IMAGE_NAME:latest .
        docker push $IMAGE_NAME:$CI_COMMIT_TAG
        docker push $IMAGE_NAME:latest
      else
        BRANCH_TAG=$(echo "$CI_COMMIT_REF_SLUG" | tr '/' '-')
        SHA_TAG="${BRANCH_TAG}-${CI_COMMIT_SHORT_SHA}"
        docker build -t $IMAGE_NAME:$BRANCH_TAG -t $IMAGE_NAME:$SHA_TAG .
        docker push $IMAGE_NAME:$BRANCH_TAG
        docker push $IMAGE_NAME:$SHA_TAG
      fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

release:
  stage: release
  image: node:${NODE_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - apk add --no-cache git
    - npm ci
  script:
    - npx semantic-release
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
